<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Forgery Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: auto;
            padding: 40px;
            background: #f5f5f5;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        .field {
            margin-bottom: 20px;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #eef;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Signature Forgery Checker</h1>

        <form method="POST" enctype="multipart/form-data">
            <div class="field">
                <label>Reference Genuine Signature:</label><br><br>
                <input type="file" name="reference" required>
            </div>

            <div class="field">
                <label>Signature To Verify:</label><br><br>
                <input type="file" name="test" required>
            </div>

            <button type="submit">Verify Signature</button>
        </form>

        {% if result %}
        <div class="result">
            <h2>Result: {{ result.label }}</h2>
            <h2>Result: {{ result.label }}</h2>
            <p>Similarity Score: {{ result.score }}</p>
            <p>Confidence: {{ result.confidence }}%</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
